# FRDM-RW612 W25N01GV NAND + Dhara FTL disk driver configuration
# Used by: tests/drivers/disk/disk_access (drivers.disk.ftl.frdm_rw612_w25n01gv)

# FlexSPI NAND driver
CONFIG_FLASH_MCUX_FLEXSPI_NAND=y
# Must be > FLASH_INIT_PRIORITY (50) so FlexSPI controller is ready first
CONFIG_FLASH_MCUX_FLEXSPI_NAND_INIT_PRIORITY=51

# Disk / FTL stack
CONFIG_DISK_DRIVERS=y
CONFIG_DISK_DRIVER_FTL=y

# Increase main stack for disk_access test with large NAND sector size (2048 B)
CONFIG_MAIN_STACK_SIZE=4096
