common:
  tags:
    - bluetooth
  platform_allow:
    - native_sim
  harness: ztest
  sidecar: bumble
tests:
  bluetooth.classic.sim.l2cap_connectionless.basic_send_recv:
    timeout: 120
    extra_configs:
      - CONFIG_BT_L2CAP_CONNLESS=y
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_connless_device2::test_01_basic_send_recv
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_connless_device1::test_01_basic_send_recv

  bluetooth.classic.sim.l2cap_connectionless.multiple_psm:
    timeout: 120
    extra_configs:
      - CONFIG_BT_L2CAP_CONNLESS=y
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_connless_device2::test_02_multiple_psm
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_connless_device1::test_02_multiple_psm

  bluetooth.classic.sim.l2cap_connectionless.register_unregister_errors:
    timeout: 120
    extra_configs:
      - CONFIG_BT_L2CAP_CONNLESS=y
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_connless_device2::test_03_register_unregister_errors
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_connless_device1::test_03_register_unregister_errors
