common:
  tags:
    - bluetooth
  platform_allow:
    - native_sim
  harness: ztest
  sidecar: bumble
tests:
  bluetooth.classic.sim.l2cap_echo.basic:
    timeout: 120
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_echo_device1::test_01_send_echo_req_and_recv_rsp
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_echo_device2::test_01_send_echo_req_and_recv_rsp
