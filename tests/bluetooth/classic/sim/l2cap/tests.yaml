common:
  tags:
    - bluetooth
  platform_allow:
    - native_sim
  harness: ztest
  sidecar: bumble
tests:
  bluetooth.classic.sim.l2cap.basic:
    timeout: 120
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_client::test_01_basic_mode
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_server::test_01_basic_mode
  bluetooth.classic.sim.l2cap.basic.mode_optional:
    timeout: 120
    extra_args:
      - EXTRA_CONF_FILE="prj_basic.conf"
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_client::test_02_basic_mode_optional
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_server::test_02_basic_mode_optional

  bluetooth.classic.sim.l2cap.retransmission:
    timeout: 120
    extra_configs:
      - CONFIG_TEST_L2CAP_SERVER_TX_DATA_POOL_COUNT=6
      - CONFIG_TEST_L2CAP_CLIENT_TX_DATA_POOL_COUNT=6
    extra_args:
      - EXTRA_CONF_FILE="prj_ret.conf"
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_client::test_03_ret_mode
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_server::test_03_ret_mode
  bluetooth.classic.sim.l2cap.retransmission.mode_optional:
    timeout: 120
    extra_configs:
      - CONFIG_TEST_L2CAP_SERVER_TX_DATA_POOL_COUNT=6
      - CONFIG_TEST_L2CAP_CLIENT_TX_DATA_POOL_COUNT=6
    extra_args:
      - EXTRA_CONF_FILE="prj_ret.conf"
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_client::test_04_ret_mode_optional
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_server::test_04_ret_mode_optional

  bluetooth.classic.sim.l2cap.enhanced_retransmission:
    timeout: 120
    extra_configs:
      - CONFIG_TEST_L2CAP_SERVER_TX_DATA_POOL_COUNT=6
      - CONFIG_TEST_L2CAP_CLIENT_TX_DATA_POOL_COUNT=6
    extra_args:
      - EXTRA_CONF_FILE="prj_eret.conf"
    harness_config:
      bumble_addresses:
        - 00:00:01:00:00:01
        - 00:00:01:00:00:02
      bumble_devices:
        - --peer_bd_address=00:00:01:00:00:02 -test=l2cap_client::test_07_eret_mode
        - --peer_bd_address=00:00:01:00:00:01 -test=l2cap_server::test_07_eret_mode
