CONFIG_ZTEST=y
CONFIG_PCIE=y
CONFIG_VIRTUALIZATION=y
CONFIG_IVSHMEM=y

# Give the shared region room for the gcov data.
CONFIG_QEMU_IVSHMEM_PLAIN_MEM_SIZE=4

# When twister enables coverage (CONFIG_COVERAGE_GCOV), route the dump through
# ivshmem instead of the console. Ignored when coverage is not enabled.
CONFIG_COVERAGE_IVSHMEM=y
