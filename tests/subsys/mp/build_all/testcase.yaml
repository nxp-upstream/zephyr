tests:
  mp.core.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64

  mp.base.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_MP_PLUGIN_ZBASE=y
      - CONFIG_MP_CAPSFILTER=y
      - CONFIG_MP_QUEUE=y
      - CONFIG_MP_TEE=y

  mp.audio.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_I2S=y
      - CONFIG_AUDIO_DMIC=y
      - CONFIG_AUDIO_CODEC=y
      - CONFIG_MP_PLUGIN_ZAUD=y

  mp.video.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_MP_PLUGIN_ZVID=y
      - CONFIG_MP_ZVID_CONVERT=y

  mp.display.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_MP_PLUGIN_ZDISP=y

  mp.jpeg.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_MP_PLUGIN_ZJPEG=y

  mp.fs.build:
    tags:
      - subsys
      - mp
    build_only: true
    platform_allow:
      - native_sim/native/64
    extra_args:
      - CONFIG_MP_PLUGIN_ZFS=y
