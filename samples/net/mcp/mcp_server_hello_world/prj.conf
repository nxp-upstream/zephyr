# MCP Server library
CONFIG_MCP_SERVER=y
CONFIG_MCP_MAX_TOOLS=4
CONFIG_MCP_REQUEST_WORKERS=2
CONFIG_MCP_SERVER_INFO_TITLE=y
CONFIG_MCP_SERVER_INFO_INSTRUCTIONS=n
CONFIG_MCP_TOOL_DESC=y
CONFIG_MCP_TOOL_TITLE=y
CONFIG_MCP_TOOL_OUTPUT_SCHEMA=n
CONFIG_MCP_TOOL_NAME_MAX_LEN=32
CONFIG_MCP_TOOL_SCHEMA_MAX_LEN=512
CONFIG_MCP_TOOL_INPUT_ARGS_MAX_LEN=512
CONFIG_MCP_TOOL_RESULT_MAX_LEN=256
CONFIG_MCP_LOG_LEVEL_DBG=y

# RNG configuration
CONFIG_TEST_RANDOM_GENERATOR=y

# Network configuration
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_DHCPV4=y

# mDNS configs
CONFIG_MDNS_RESPONDER=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="mcp-hello-world"
CONFIG_ZVFS_EVENTFD_MAX=2

# MCP HTTP server
CONFIG_MCP_HTTP_LOG_ADDRESS=y
CONFIG_MCP_HTTP_PORT=8080
CONFIG_MCP_HTTP_ENDPOINT="/mcp"
CONFIG_HTTP_SERVER_MAX_CLIENTS=3
CONFIG_HTTP_SERVER_MAX_STREAMS=3
CONFIG_HTTP_SERVER_MAX_HEADER_LEN=38

# General configs
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_KERNEL_MEM_POOL=y
CONFIG_THREAD_NAME=n

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_GPIO=y

CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_LOG_MODE_IMMEDIATE=y


# Enable PSA Crypto
CONFIG_PSA_CRYPTO=y
CONFIG_PSA_WANT_ALG_SHA_1=y

# MCP Authentication Configuration
CONFIG_MCP_HTTP_AUTH_ENABLED=y
CONFIG_MCP_HTTP_AUTH_HEADER_MAX_LEN=1024
CONFIG_MCP_HTTP_AUTH_EXPECTED_ALGORITHM="RS256"
CONFIG_MCP_HTTP_AUTH_EXPECTED_ISSUER="https://auth.example.com"
CONFIG_MCP_HTTP_AUTH_EXPECTED_AUDIENCE="mcp-server"
CONFIG_MCP_HTTP_AUTH_REQUIRED_SCOPE="mcp:invoke"
CONFIG_MCP_HTTP_AUTH_CHECK_EXPIRATION=y