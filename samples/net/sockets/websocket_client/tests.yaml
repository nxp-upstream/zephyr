common:
  tags:
    - net
    - http
    - http_client
    - websocket_client
    - websocket
  min_ram: 35
  depends_on: netif
sample:
  description: Websocket client sample
  name: websocket_client
tests:
  sample.net.sockets.websocket_client:
    platform_exclude: intel_adsp/cavs25
    harness: net
  # Actually runs (not build-only): the net harness brings up the net-tools
  # sidecar, which creates a host tap and a companion echo websocket server on
  # port 9001. The guest opens websockets to it and logs each connection. The
  # server hard-codes 192.0.2.2, so net_shared_subnet keeps the sample's own
  # addresses (one such test at a time).
  sample.net.sockets.websocket_client.nettools:
    harness: net
    extra_configs:
      - CONFIG_ETH_E1000=y
      - CONFIG_NET_QEMU_ETHERNET=y
      - CONFIG_NET_CONFIG_NEED_IPV6=n
      - CONFIG_NET_IPV6=n
    harness_config:
      type: one_line
      net_shared_subnet: true
      net_tools_apps:
        - websocket-server
      regex:
        - "Websocket .* connected"
    platform_allow:
      - qemu_x86
    integration_platforms:
      - qemu_x86
