CONFIG_PRINTK=y

CONFIG_NETWORKING=y
CONFIG_NET_IPV6=y
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y

CONFIG_NET_DHCPV4=n

CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=3
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=3
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_PKT_TX_COUNT=80
CONFIG_NET_BUF_TX_COUNT=50
CONFIG_NET_BUF_RX_COUNT=50
CONFIG_DWMAC_NB_TX_DESCS=50
CONFIG_DWMAC_NB_RX_DESCS=50
# CONFIG_NET_BUF_DATA_SIZE=1536

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_INIT_STACKS=y

# CONFIG_NET_BUF_LOG=y
# CONFIG_NET_BUF_LOG_LEVEL_DBG=n
# CONFIG_NET_LOG=y
# CONFIG_NET_L2_ETHERNET_LOG_LEVEL_DBG=y
CONFIG_ETHERNET_LOG_LEVEL_WRN=y
# CONFIG_MDIO_LOG_LEVEL_DBG=y
CONFIG_CBPRINTF_PACKAGE_LOG_LEVEL_OFF=y

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"

CONFIG_NET_SHELL=y
CONFIG_KERNEL_SHELL=y
CONFIG_SHELL_BACKEND_TELNET=y
CONFIG_SHELL_TELNET_SUPPORT_COMMAND=y

CONFIG_LOG=y

CONFIG_MDIO_SHELL=y
