CONFIG_OPENTHREAD_ZEPHYR_BORDER_ROUTER_WEB_SERVER=y

# Optional: Increase buffer sizes for JSON payloads
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=1024
CONFIG_HTTP_SERVER_MAX_CONTENT_TYPE_LENGTH=128

#CONFIG_HEAP_MEM_POOL_SIZE=81920
CONFIG_ZVFS_EVENTFD_MAX=10

CONFIG_HTTP_SERVER_STACK_SIZE=8192

CONFIG_OPENTHREAD_DEBUG=y
CONFIG_OPENTHREAD_LOG_LEVEL_INFO=y
CONFIG_OPENTHREAD_L2_DEBUG=y
CONFIG_OPENTHREAD_L2_LOG_LEVEL_INF=y


# all the following is to advertise http MDNS 
CONFIG_ZVFS_POLL_MAX=64
# Network socket service
CONFIG_NET_SOCKETS_SERVICE=y
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048

# mDNS/DNS-SD support
CONFIG_MDNS_RESPONDER=y
CONFIG_DNS_SD=y
CONFIG_MDNS_RESPONDER_DNS_SD=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME="zephyr-nxp-rw612-otbr"

# more connections than 16 in prj.conf
CONFIG_NET_MAX_CONTEXTS=32

# Increase network buffers
CONFIG_NET_PKT_RX_COUNT=32
CONFIG_NET_PKT_TX_COUNT=32
CONFIG_NET_BUF_RX_COUNT=128
CONFIG_NET_BUF_TX_COUNT=128

# Increase simultanate TCP connections
CONFIG_NET_MAX_CONN=32

# Increase IPv6 address number
CONFIG_NET_IF_UNICAST_IPV6_ADDR_COUNT=8
CONFIG_NET_IF_MCAST_IPV6_ADDR_COUNT=8

# Increase buffers size for NAT64
CONFIG_NET_BUF_DATA_SIZE=256

# Increase heap size for more connections
CONFIG_HEAP_MEM_POOL_SIZE=131072
