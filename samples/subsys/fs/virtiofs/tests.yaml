sample:
  name: virtio filesystem sample
common:
  tags:
    - filesystem
    - virtio
  harness: console
  sidecar: virtiofs
  harness_config:
    type: multi_line
    ordered: true
    virtiofs_shared: shared
    regex:
      - "/virtiofs directory tree:"
      - "/virtiofs/file content:"
      - "this is a file on the host"
tests:
  sample.filesystem.virtiofs:
    platform_allow:
      - qemu_x86
      - qemu_x86_64
    filter: CONFIG_DT_HAS_VIRTIO_PCI_ENABLED
