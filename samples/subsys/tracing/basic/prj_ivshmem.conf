# Overlay: stream the CTF trace into an ivshmem-plain shared memory region
# instead of semihosting; a host tool (e.g. the twister ivshmem sidecar) reads
# it back after the run. Useful on QEMU targets without semihosting.
# Applied on top of prj.conf with EXTRA_CONF_FILE=prj_ivshmem.conf and the
# matching ivshmem.overlay for the qemu,ivshmem devicetree node.
CONFIG_TRACING_BACKEND_IVSHMEM=y

CONFIG_PCIE=y
CONFIG_VIRTUALIZATION=y
CONFIG_IVSHMEM=y
# A small region fits the guest's virtual address space and holds a short trace.
CONFIG_QEMU_IVSHMEM_PLAIN_MEM_SIZE=1
