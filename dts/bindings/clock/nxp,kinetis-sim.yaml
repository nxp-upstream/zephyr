description: Kinetis System Integration Module (SIM) IP node

compatible: "nxp,kinetis-sim"

include: base.yaml

properties:
  reg:
    required: true

  pllfll-select:
    type: int
    required: true
    description: pll/fll selection for clock system

  er32k-select:
    type: int
    required: true
    description: er32k selection for clock system

  clkout-source:
    type: int
    description: clkout clock source

  clkout-divider:
    type: int
    description: clkout divider

  "#clock-cells":
    type: int
    const: 3

# Notes:
# - Some consumers historically pass only the `name` clock-cell to the
#   clock_control API.
# - Devicetrees encode gate+rate information into the `name` cell using
#   helpers from <zephyr/dt-bindings/clock/kinetis_sim.h> (for example
#   `KINETIS_SIM_SUBSYS_ENCODE`/`KINETIS_SIM_CLOCK_SPEC`), while still
#   providing the required `offset` and `bits` cells.
clock-cells:
  - name
  - offset
  - bits
